<!doctype html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <!--<title>{{ page.title }} | {{ site.title }}</title>-->

        <style>
            @font-face {
                font-family: myriad-pro;
                src: url("../Assets/fonts/myriad-pro/MYRIADPRO-REGULAR.OTF") format("opentype");
            }
            body {
                background: repeating-linear-gradient(
                    #f0f0f0,
                    #f0f0f0 4px,
                    #ffffff 4px,
                    #ffffff 8px
                );
                /*height: 100vh;
        width: 100vw;*/
                display: grid;
                place-content: center center;
                column-gap: 2rem;
            }

            button {
                grid-row: 1;
                font-size: 1.5rem;
                font-family: "myriad-pro", system-ui;
                height: 1.75em;
                padding: 0 em;
                min-width: 6em;
                border-radius: 1000px;
                position: relative;
                overflow: hidden;
                cursor: default;
                outline: none;
            }

            @mixin pseudo-positioning {
                content: "";
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                height: 33%;
            }

            button.primary {
                background: linear-gradient(
                    rgba(0, 65, 184, 0.625),
                    rgba(45, 115, 199, 0.625),
                    rgba(33, 160, 196, 0.625)
                );
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.3),
                    0 0.125em 0.125em rgba(0, 78, 187, 0.5),
                    inset 0 0.25em 0.5em rgba(0, 17, 49, 0.8),
                    inset 0 0.375em 0.5em 0.25em rgba(0, 78, 187, 0.75);
            }

            button.primary:focus,
            button.primary:active {
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.3),
                    0 0.125em 0.125em rgba(0, 78, 187, 0.5),
                    inset 0 0.25em 0.5em rgba(0, 17, 49, 0.8),
                    inset 0 0.375em 0.5em 0.25em rgba(0, 78, 187, 0.75),
                    0 0 0.5em rgba(52, 106, 227, 0.5);
            }

            button.secondary {
                background: linear-gradient(
                    rgba(160, 160, 160, 0.625),
                    rgba(255, 255, 255, 0.625)
                );
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.2),
                    0 0.125em 0.125em rgba(0, 0, 0, 0.3),
                    inset 0 0.25em 0.25em rgba(0, 0, 0, 0.4),
                    inset 0 0.375em 0.5em 0.25em #bbbbbb;
            }

            button.secondary:focus,
            button.secondary:active {
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.2),
                    0 0.125em 0.125em rgba(0, 0, 0, 0.3),
                    inset 0 0.25em 0.25em rgba(0, 0, 0, 0.4),
                    inset 0 0.375em 0.5em 0.25em #bbbbbb,
                    0 0 0.5em rgba(0, 0, 0, 0.25);
            }

            /* top shine */
            button:before {
                @include pseudo-positioning;
                background: linear-gradient(
                    rgba(255, 255, 255, 0.9),
                    rgba(255, 255, 255, 0.3)
                );
                width: calc(100% - 0.875em);
                border-radius: 2em 2em 0.5em 0.5em;
                top: 5%;
                filter: blur(1px);
                z-index: 2;
            }

            /* bottom glow */
            button:after {
                @include pseudo-positioning;
                background: linear-gradient(
                    rgba(255, 255, 255, 0.2),
                    rgb(255, 255, 255, 0.5)
                );
                width: calc(100% - 1.25em);
                border-radius: 0.75em;
                bottom: 10%;
                filter: blur(3px);
            }

            /* text */
            button span {
                position: relative;
                top: -1px;
                z-index: 1;
                letter-spacing: 0.0375em;
                -webkit-text-stroke-width: 0.025em;
                -webkit-text-stroke-color: #000000;
            }

            button.primary span {
                text-shadow: 0 0.25em 0.2em rgba(30, 77, 161, 0.5);
            }

            button.secondary span {
                text-shadow: 0 0.25em 0.2em rgba(0, 0, 0, 0.25);
            }
            :root {
                --violet: #c8a2c8;
                --cream: #fbb9b9;
                --active: #dbdace;
            }
            a {
                font-size: 2.5em;
                color: var(--cream);
            }
            a:active {
                color: var(--active);
            }
            body {
                color: darkgray;
                background-color: var(--violet);
                inset: 0;
                z-index: 1;
                isolation: isolate;
                width: 90vw;
                font-family: "myriad-pro", system-ui;
            }
            #name {
                font-size: 5rem;
            }
            p {
                font-size: 2.5rem;
                position: relative;
                z-index: 2;

                mix-blend-mode: difference;
            }
            point {
                padding: 0.1em 0.35em;
                border-radius: 0.35em;
                transition:
                    background-color 0.25s ease,
                    color 0.25s ease;
            }

            point.active {
                background-color: var(--cream);
                color: var(--violet);
            }
            /* Background bounce layer */
            #dvd-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                overflow: hidden;
                pointer-events: none;
            }

            #dvd-logo {
                position: fixed;
                inset: 0;
                pointer-events: none;
                isolation: isolate;
                position: absolute;
                width: 140px; /* adjust size */
                max-height: 140px;
                user-select: none;
                pointer-events: none;
                transition: opacity 0.4s ease;
                object-fit: contain;
            }
            h2 {
                position: sticky;
            }

            ul li {
                margin-bottom: 0.75em;
            }

            .post-link {
                display: inline-block;
                font-family: "myriad-pro", system-ui;
                font-size: 2rem;
                line-height: 1.75em;
                padding: 0 0.75em;
                min-width: 6em;
                border-radius: 1000px;
                position: relative;
                overflow: hidden;
                text-decoration: none;
                color: white;
                text-shadow: 0 0.1em 0.2em rgba(0, 0, 0, 0.6);
                background: linear-gradient(
                    rgba(0, 65, 184, 0.625),
                    rgba(45, 115, 199, 0.625),
                    rgba(33, 160, 196, 0.625)
                );
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.3),
                    0 0.125em 0.125em rgba(0, 78, 187, 0.5),
                    inset 0 0.25em 0.5em rgba(0, 17, 49, 0.8),
                    inset 0 0.375em 0.5em 0.25em rgba(0, 78, 187, 0.75);
            }

            .post-link:active {
                color: white;
                box-shadow:
                    0 0.375em 0.5em rgba(0, 0, 0, 0.3),
                    0 0.125em 0.125em rgba(0, 78, 187, 0.5),
                    inset 0 0.25em 0.5em rgba(0, 17, 49, 0.8),
                    inset 0 0.375em 0.5em 0.25em rgba(0, 78, 187, 0.75),
                    0 0 0.5em rgba(52, 106, 227, 0.5);
            }
        </style>
    </head>
    <body>
        <div id="title">
            <h1 id="name">Ivy Bixler</h1>
            <a href="/"><button class="secondary">Home</button></a>
            <a href="https://github.com/ibixler"
                ><button class="secondary">github</button></a
            >
            <a href="/blog"><button class="primary">Blog</button></a>
        </div>

        <!--<div id="title">
      <h1 id="name"><a href="/">Ivy Bixler</a></h1>
      <a href="https://github.com/ibixler"> github </a>
    </div>-->

        <div id="text-content">{{ content }}</div>

        <!-- Only include DVD animation on home page -->
        {% if page.title == "Home" %}
        <div id="dvd-bg">
            <img id="dvd-logo" src="Assets/bounce/vw-logo.png" alt="logo" />
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const activatables = document.querySelectorAll("point");
                const logo = document.getElementById("dvd-logo");
                const container = document.getElementById("dvd-bg");

                // List all images you want to cycle through

                const basePath = "Assets/Bounce/";
                const makePath = (src, key) => {
                    return {
                        src: basePath + src,
                        key: key,
                    };
                };
                const images = [
                    makePath("vw-logo.png", "vw"),
                    makePath("tux.png", "linux"),
                    makePath("music.png", "music"),
                ];

                let currentImage = 0;
                let canSwapImage = true;

                function nextImage() {
                    currentImage = (currentImage + 1) % images.length;
                    const { src, key } = images[currentImage];

                    logo.src = src;

                    activatables.forEach((el) => {
                        el.classList.toggle(
                            "active",
                            el.dataset.activate === key,
                        );
                    });
                }

                function startBounce() {
                    const getBounds = () => ({
                        w: container.clientWidth,
                        h: container.clientHeight,
                        lw: logo.clientWidth,
                        lh: logo.clientHeight,
                    });

                    let { w, h, lw, lh } = getBounds();

                    let x = Math.random() * (w - lw);
                    let y = Math.random() * (h - lh);
                    let vx = 1.2;
                    let vy = 1.1;

                    function handleCollision() {
                        if (!canSwapImage) return;

                        canSwapImage = false;
                        logo.style.opacity = "0";

                        setTimeout(() => {
                            nextImage();
                            logo.style.opacity = "1";
                            canSwapImage = true;
                        }, 150);
                    }

                    function animate() {
                        ({ w, h, lw, lh } = getBounds());

                        x += vx;
                        y += vy;

                        let collided = false;

                        if (x <= 0 || x + lw >= w) {
                            vx *= -1;
                            x = Math.max(0, Math.min(x, w - lw));
                            collided = true;
                        }

                        if (y <= 0 || y + lh >= h) {
                            vy *= -1;
                            y = Math.max(0, Math.min(y, h - lh));
                            collided = true;
                        }

                        if (collided) {
                            handleCollision();
                        }

                        logo.style.transform = `translate(${x}px, ${y}px)`;
                        requestAnimationFrame(animate);
                    }

                    animate();
                }

                // Ensure the first image is loaded before getting dimensions
                if (logo.complete) {
                    startBounce();
                } else {
                    logo.onload = startBounce;
                }
            });
        </script>
        {% endif %}

        <footer>Ivy Bixler © 2025</footer>
    </body>
</html>
